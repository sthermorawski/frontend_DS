<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pizzaria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>grenal pizzaria</h1>
  
  </header>

  <div class="container">

    <h2>Faça seu pedido</h2>
    

    <input type="text" placeholder="nome do cliente">

    <input type="text" placeholder="endereço">

    <p>tamanho da pizza </p>

    <select>
        <option>pequena (20cm)</option>
        <option>media (30cm)</option>
        <option>grande (50cm)</option>
        <option>grande GG (60cm)</option>
    </select>

    <p>sabor (salgadas) </p>

    <select>
      
      <option>GEROMEL (strogonoff de gado, queijo e batata palha)</option>
      <option>FALCAO (pimentao, coração de galinha e pimenta)</option>
      <option>GALOPEIRA (queijo, calabresa e oregano)</option>
      <option>MIMOSA (queijo branco, queijo cheddar, mutssarela e catupiry)</option>
      <option>CAIPIRA (frango, milgo e queijo colonial)</option>
      <option>POPULAR (queijo, rucula, milho e tomate)</option>
      <option>GERAL (peperoni, cheiro verde e queijo)</option>
      <option>DO SUL (queijo, pinhao e frango)</option>
      <option>GAUCHA (queijo, alho e picanha defumada)</option>
    </select>

    <p>sabor (doces) </p>

    <select>
      
        <option>KANEMANN (ninho e creme de avelã)</option>
        <option>D'ALESSANDRO (chocolate preto e frutas vermelhas)</option>
        <option>TRICOLOR (chocolate preto, bis branco e M&M azul)</option>
        <option>COLORADO (chocolate branco e morangos)</option>
        
      </select>

    <button>Enviar Pedido</button>

  </div>

</body>
</html>
